# === Banco de dados H2 (em memória) ===
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:biblioteca;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# === Hibernate ===
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=true

# === Servidor HTTP ===
quarkus.http.port=8080

# -----------------------------------------------------------------------------
# Configurações de Segurança
#
# A aplicação utiliza o mecanismo de autenticação baseado em formulários do
# Quarkus. Quando um usuário não autenticado tenta acessar qualquer página
# protegida, ele é redirecionado para a página de login especificada em
# quarkus.http.auth.form.login-page. Após autenticar com sucesso, o usuário é
# encaminhado para a landing page configurada. Se as credenciais forem
# incorretas, ele volta para a página de erro definida. A chave de
# criptografia é necessária para proteger o cookie que armazena as
# informações de sessão【848466333383949†L150-L163】.

# Habilita a autenticação via formulário.
quarkus.http.auth.form.enabled=true
# Página de login exibida aos usuários não autenticados.
quarkus.http.auth.form.login-page=/login.html
# Página de destino após o login bem-sucedido (página principal da aplicação).
quarkus.http.auth.form.landing-page=/index.xhtml
# Página de erro (adiciona parâmetro error=true à URL para mostrar mensagem)
quarkus.http.auth.form.error-page=/login.html?error=true
# Chave de criptografia para o cookie de sessão. Deve ter pelo menos 16 caracteres.
quarkus.http.auth.session.encryption-key=BibliotecaDigital123

# Permissões HTTP: permite acesso anônimo à página de login e a recursos estáticos,
# enquanto exige autenticação para todas as outras rotas.  O padrão '*' captura
# todas as páginas JSF e REST da aplicação.
quarkus.http.auth.permission.login.paths=/login.html,/login.xhtml,/javax.faces.resource/*
quarkus.http.auth.permission.login.policy=permit
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Política de acesso para administradores: somente usuários com papel 'admin'
# podem acessar as páginas sob o diretório /admin. A documentação do Quarkus
# mostra que é possível criar políticas baseadas em papéis usando a
# propriedade roles-allowed e associá-las a permissões específicas【55237235738661†L90-L104】.
quarkus.http.auth.policy.admin-policy.roles-allowed=admin
quarkus.http.auth.permission.admin.paths=/admin/*
quarkus.http.auth.permission.admin.policy=admin-policy
